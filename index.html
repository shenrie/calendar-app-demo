<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <button id="today-btn" class="today-btn">Today</button>
      <button id="prev-btn" class="nav-btn" aria-label="Previous month">&#8249;</button>
      <button id="next-btn" class="nav-btn" aria-label="Next month">&#8250;</button>
      <h1 id="month-year-label"></h1>
      <button id="add-event-btn" class="add-event-btn" aria-label="Add event">+</button>
    </header>

    <div class="day-names" role="row">
      <span role="columnheader">SUN</span><span role="columnheader">MON</span><span role="columnheader">TUE</span><span role="columnheader">WED</span><span role="columnheader">THU</span><span role="columnheader">FRI</span><span role="columnheader">SAT</span>
    </div>

    <div id="calendar-grid" class="calendar-grid" role="grid" aria-label="Calendar"></div>
  </div>

  <!-- Event Modal -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <h2 id="modal-title">Add Event</h2>
      <form id="event-form" novalidate>
        <input type="hidden" id="event-id">

        <label for="event-title-input">Title *</label>
        <input type="text" id="event-title-input" required aria-describedby="title-error">
        <span id="title-error" class="error-msg" aria-live="polite"></span>

        <label for="event-date-input">Date *</label>
        <input type="date" id="event-date-input" required aria-describedby="date-error">
        <span id="date-error" class="error-msg" aria-live="polite"></span>

        <label for="event-desc-input">Description</label>
        <textarea id="event-desc-input" rows="3"></textarea>

        <div class="modal-actions">
          <button type="submit" class="btn-save">Save</button>
          <button type="button" id="delete-btn" class="btn-delete hidden">Delete</button>
          <button type="button" id="cancel-btn" class="btn-cancel">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
